name: Streamlit Keep-Alive Pinger

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Ping Streamlit Apps with Playwright
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          
          URLS = [
              'https://fortress-dashboard-6zwjkvspegjb6am8beenfp.streamlit.app/',
              'https://fortress-dashboard-ctxy9vunnjupsikksu5pnc.streamlit.app/'
          ]
          
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context()
              
              for url in URLS:
                  print('----------------------------------------')
                  print(f'Pinging {url} to prevent Streamlit Cloud from sleeping...')
                  page = context.new_page()
                  try:
                      # Navigate to the Streamlit app
                      page.goto(url, wait_until='networkidle', timeout=60000)
                      
                      # If the app went to sleep, Streamlit Cloud shows a wake up button
                      wake_button = page.locator('button:has-text(\"Yes, get this app back up!\")')
                      if wake_button.is_visible():
                          print('App is asleep! Clicking wake up button...')
                          wake_button.click()
                          page.wait_for_timeout(15000) # Give it time to spin up
                      
                      # Keep the page open for a few seconds to ensure WebSocket registers
                      page.wait_for_timeout(5000)
                      print('✅ Successfully pinged and established WebSocket connection.')
                  except Exception as e:
                      print(f'⚠️ Error pinging {url}: {e}')
                  finally:
                      page.close()
              
              browser.close()
          "
